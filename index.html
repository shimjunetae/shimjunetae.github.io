<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Kingdom Defense FINAL</title>

<style>
body{
    margin:0;
    background:#0f111a;
    color:white;
    text-align:center;
    font-family:sans-serif;
}

#game{
    width:800px;
    height:500px;
    margin:auto;
    background:#1c1f2a;
    position:relative;
    overflow:hidden;
    border:2px solid #4db8ff;
}

.path{
    position:absolute;
    width:100%;
    height:60px;
    background:#444;
    top:220px;
}

.tower{
    width:50px;
    height:50px;
    position:absolute;
    background-size:cover;
    background-position:center;
}

.enemy{
    width:35px;
    height:35px;
    position:absolute;
    border-radius:50%;
    background:red;
}

.boss{
    width:80px;
    height:80px;
    position:absolute;
    background:url('./images/boss.jpg') center/cover;
}

.bullet{
    width:6px;
    height:6px;
    background:yellow;
    position:absolute;
    border-radius:50%;
}

button{
    margin:5px;
    padding:10px;
    background:#4db8ff;
    border:none;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>🏰 KINGDOM DEFENSE</h1>
<h3>💰 돈: <span id="money">100</span></h3>
<h3>🌊 웨이브: <span id="wave">1</span></h3>

<div id="game">
    <div class="path"></div>
</div>

<div>
    <button onclick="select(1)">궁수 (20)</button>
    <button onclick="select(2)">마법사 (40)</button>
    <button onclick="select(3)">터렛 (60)</button>
</div>

<audio id="shoot" src="sound/shoot.mp3"></audio>
<audio id="kill" src="sound/kill.mp3"></audio>
<audio id="boss" src="sound/boss.mp3"></audio>

<script>
let game = document.getElementById("game");

let money = 100;
let wave = 1;
let selected = 1;

let towers = [];
let enemies = [];
let bullets = [];

document.getElementById("money").innerText = money;

/* ===================== */
/*        PATH (3코너)    */
/* ===================== */
const path = [
    {x:0, y:235},
    {x:300, y:235},
    {x:300, y:120},
    {x:800, y:120}
];

/* ===================== */
/*       WAVE SYSTEM      */
/* ===================== */
function startWave(){
    let count = wave * 3;

    let interval = setInterval(()=>{
        spawnEnemy();

        count--;
        if(count <= 0){
            clearInterval(interval);

            if(wave % 5 == 0){
                spawnBoss();
            }

            wave++;
            document.getElementById("wave").innerText = wave;

            setTimeout(startWave, 3000);
        }
    }, 800);
}

startWave();

/* ===================== */
/*       SELECT TOWER    */
/* ===================== */
function select(t){
    selected = t;
}

/* ===================== */
/*     PATH CHECK (건설 금지) */
/* ===================== */
function isOnPath(x,y){
    return (y > 190 && y < 280);
}

/* ===================== */
/*     PLACE TOWER       */
/* ===================== */
game.addEventListener("click",(e)=>{
    let rect = game.getBoundingClientRect();
    let x = e.clientX - rect.left;
    let y = e.clientY - rect.top;

    if(isOnPath(x,y)) return;

    let cost = selected==1?20:selected==2?40:60;
    if(money < cost) return;

    money -= cost;
    updateMoney();

    let tower = document.createElement("div");
    tower.className = "tower";

    let img =
        selected==1?"archer.jpg":
        selected==2?"mage.jpg":
        "turret.jpg";

    tower.style.backgroundImage = `url('./images/${img}')`;
    tower.style.left = (x-25)+"px";
    tower.style.top = (y-25)+"px";

    game.appendChild(tower);

    towers.push({
        el:tower,
        x,y,
        cd:0,
        type:selected
    });
});

/* ===================== */
/*     ENEMY SPAWN       */
/* ===================== */
function spawnEnemy(){
    let e = document.createElement("div");
    e.className = "enemy";

    game.appendChild(e);

    enemies.push({
        el:e,
        x:0,
        y:235,
        hp:3,
        pathIndex:0
    });
}

/* ===================== */
/*        BOSS           */
/* ===================== */
function spawnBoss(){
    let b = document.createElement("div");
    b.className = "boss";

    game.appendChild(b);

    enemies.push({
        el:b,
        x:0,
        y:210,
        hp:20,
        boss:true,
        pathIndex:0
    });

    document.getElementById("boss").play().catch(()=>{});
}

/* ===================== */
/*     MOVE ENEMY        */
/* ===================== */
function moveEnemy(e){
    let target = path[e.pathIndex];
    if(!target) return;

    let dx = target.x - e.x;
    let dy = target.y - e.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    let speed = e.boss ? 1 : 2;

    if(dist < speed){
        e.x = target.x;
        e.y = target.y;
        e.pathIndex++;
    } else {
        e.x += dx / dist * speed;
        e.y += dy / dist * speed;
    }

    e.el.style.left = e.x+"px";
    e.el.style.top = e.y+"px";
}

/* ===================== */
/*     SHOOT SYSTEM      */
/* ===================== */
function shoot(t,e){

    if(t.type === 1){
        createBullet(t,e,6,0,false);
    }

    else if(t.type === 2){
        createBullet(t,e,3,30,true);
    }

    else if(t.type === 3){
        createBullet(t,e,8,0,false);
    }
}

/* ===================== */
/*   CREATE BULLET       */
/* ===================== */
function createBullet(t,e,speed,splash,isMagic){

    let b = document.createElement("div");
    b.className = "bullet";

    let dx = e.x - t.x;
    let dy = e.y - t.y;
    let d = Math.sqrt(dx*dx + dy*dy);

    let bullet = {
        el:b,
        x:t.x,
        y:t.y,
        vx:dx/d*speed,
        vy:dy/d*speed,
        splash:splash
    };

    game.appendChild(b);
    bullets.push(bullet);

    document.getElementById("shoot").play().catch(()=>{});
}

/* ===================== */
/*       UPDATE LOOP     */
/* ===================== */
setInterval(update,30);

function update(){

    /* MOVE ENEMIES */
    enemies.forEach(e=>{
        moveEnemy(e);
    });

    /* TOWER ATTACK */
    towers.forEach(t=>{
        if(t.cd > 0) t.cd--;

        enemies.forEach(e=>{
            let dx=e.x-t.x;
            let dy=e.y-t.y;
            let d=Math.sqrt(dx*dx+dy*dy);

            if(d<130 && t.cd<=0){
                shoot(t,e);
                t.cd = 20;
            }
        });
    });

    /* BULLET UPDATE */
    for(let i=bullets.length-1;i>=0;i--){
        let b = bullets[i];

        b.x += b.vx;
        b.y += b.vy;

        b.el.style.left = b.x+"px";
        b.el.style.top = b.y+"px";

        for(let j=0;j<enemies.length;j++){
            let e = enemies[j];

            let hit =
                Math.abs(b.x-e.x)<20 &&
                Math.abs(b.y-e.y)<20;

            if(hit){

                /* AOE MAGIC */
                if(b.splash > 0){
                    enemies.forEach(en=>{
                        let dx = en.x - b.x;
                        let dy = en.y - b.y;
                        let d = Math.sqrt(dx*dx + dy*dy);

                        if(d < b.splash){
                            en.hp -= 2;
                        }
                    });
                }
                else {
                    e.hp -= 1;
                }

                document.getElementById("kill").play().catch(()=>{});

                if(e.hp<=0){
                    e.el.remove();
                    e.dead = true;
                    money += 10;
                    updateMoney();
                }

                b.el.remove();
                bullets.splice(i,1);
                break;
            }
        }
    }

    enemies = enemies.filter(e=>!e.dead);
}

/* ===================== */
/*       MONEY UI        */
/* ===================== */
function updateMoney(){
    document.getElementById("money").innerText = money;
}
</script>

</body>
</html>
