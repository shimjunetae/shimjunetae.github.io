<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Kingdom Defense FINAL</title>

<style>
body{
    margin:0;
    background:#0f111a;
    color:white;
    text-align:center;
    font-family:sans-serif;
}

#game{
    width:800px;
    height:500px;
    margin:auto;
    background:#1c1f2a;
    position:relative;
    overflow:hidden;
    border:2px solid #4db8ff;
}

.path{
    position:absolute;
    width:100%;
    height:60px;
    background:#444;
    top:220px;
}

.tower{
    width:50px;
    height:50px;
    position:absolute;
    background-size:cover;
}

.enemy{
    width:35px;
    height:35px;
    position:absolute;
    border-radius:50%;
    background:red;
}

.boss{
    width:80px;
    height:80px;
    position:absolute;
    background:url('./images/boss.jpg') center/cover;
}

.bullet{
    width:6px;
    height:6px;
    background:yellow;
    position:absolute;
    border-radius:50%;
}

#ui{
    margin-top:10px;
}

button{
    margin:5px;
    padding:10px;
    background:#4db8ff;
    border:none;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>🏰 KINGDOM DEFENSE</h1>
<h3>💰 돈: <span id="money">100</span></h3>
<h3>🌊 웨이브: <span id="wave">1</span></h3>

<div id="game">
    <div class="path"></div>
</div>

<div id="ui">
    <button onclick="select(1)">궁수 (20)</button>
    <button onclick="select(2)">마법사 (40)</button>
    <button onclick="select(3)">터렛 (60)</button>
</div>

<!-- 사운드 -->
<audio id="shoot" src="sound/shoot.mp3"></audio>
<audio id="kill" src="sound/kill.mp3"></audio>
<audio id="boss" src="sound/boss.mp3"></audio>

<script>
let game = document.getElementById("game");

let money = 100;
let wave = 1;

let selected = 1;

let towers = [];
let enemies = [];
let bullets = [];

document.getElementById("money").innerText = money;

/* 웨이브 시스템 */
function startWave(){
    let count = wave * 3;

    let interval = setInterval(()=>{
        spawnEnemy();

        count--;
        if(count <= 0){
            clearInterval(interval);

            if(wave % 5 == 0){
                spawnBoss();
            }

            wave++;
            document.getElementById("wave").innerText = wave;

            setTimeout(startWave, 3000);
        }
    }, 800);
}

startWave();

/* 타워 선택 */
function select(t){
    selected = t;
}

/* 타워 설치 */
game.addEventListener("click",(e)=>{
    let rect = game.getBoundingClientRect();
    let x = e.clientX - rect.left;
    let y = e.clientY - rect.top;

    if(y > 180 && y < 300){

        let cost = selected==1?20:selected==2?40:60;
        if(money < cost) return;

        money -= cost;
        updateMoney();

        let tower = document.createElement("div");
        tower.className = "tower";

        let img = selected==1?"archer.jpg":
                  selected==2?"mage.jpg":"turret.jpg";

        tower.style.backgroundImage = `url('./images/${img}')`;
        tower.style.left = (x-25)+"px";
        tower.style.top = (y-25)+"px";

        game.appendChild(tower);

        towers.push({el:tower,x:x,y:y});
    }
});

/* 적 */
function spawnEnemy(){
    let e = document.createElement("div");
    e.className = "enemy";
    e.style.left="0px";
    e.style.top="235px";

    game.appendChild(e);

    enemies.push({el:e,x:0,y:235,hp:3});
}

/* 보스 */
function spawnBoss(){
    let b = document.createElement("div");
    b.className = "boss";
    b.style.left="0px";
    b.style.top="210px";

    game.appendChild(b);

    enemies.push({el:b,x:0,y:210,hp:20,boss:true});

    document.getElementById("boss").play();
}

/* 업데이트 */
setInterval(update,30);

function update(){

    enemies.forEach((e,i)=>{
        e.x += e.boss?1:2;
        e.el.style.left = e.x+"px";

        if(e.x > 800){
            e.el.remove();
            enemies.splice(i,1);
        }
    });

    towers.forEach(t=>{
        enemies.forEach(e=>{
            let dx=e.x-t.x;
            let dy=e.y-t.y;
            let d=Math.sqrt(dx*dx+dy*dy);

            if(d<130){
                shoot(t,e);
            }
        });
    });

    bullets.forEach((b,i)=>{
        b.x+=b.vx;
        b.y+=b.vy;

        b.el.style.left=b.x+"px";
        b.el.style.top=b.y+"px";

        enemies.forEach(e=>{
            if(Math.abs(b.x-e.x)<20 && Math.abs(b.y-e.y)<20){
                e.hp--;

                document.getElementById("kill").play();

                if(e.hp<=0){
                    e.el.remove();
                    e.dead=true;
                    money+=10;
                    updateMoney();
                }

                b.el.remove();
                bullets.splice(i,1);
            }
        });
    });

    enemies = enemies.filter(e=>!e.dead);
}

/* 공격 */
function shoot(t,e){
    if(Math.random()<0.07){
        let b=document.createElement("div");
        b.className="bullet";

        let dx=e.x-t.x;
        let dy=e.y-t.y;
        let d=Math.sqrt(dx*dx+dy*dy);

        b.x=t.x;
        b.y=t.y;

        b.vx=dx/d*5;
        b.vy=dy/d*5;

        b.el=b;

        game.appendChild(b);
        bullets.push(b);

        document.getElementById("shoot").play();
    }
}

/* 돈 */
function updateMoney(){
    document.getElementById("money").innerText=money;
}
</script>

</body>
</html>
