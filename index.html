<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Kingdom Defense GAME</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
    text-align:center;
}

#game{
    width:800px;
    height:500px;
    margin:20px auto;
    background:#222;
    position:relative;
    overflow:hidden;
    border:2px solid #4db8ff;
}

.turret{
    width:60px;
    height:60px;
    position:absolute;
    bottom:20px;
    left:370px;
    background:url('images/turret.jpg');
    background-size:cover;
}

.enemy{
    width:40px;
    height:40px;
    position:absolute;
    top:0;
    background:red;
    border-radius:50%;
}

.bullet{
    width:8px;
    height:8px;
    background:yellow;
    position:absolute;
    border-radius:50%;
}
button{
    padding:10px 20px;
    margin-top:10px;
    background:#4db8ff;
    border:none;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>🏰 Kingdom Defense GAME</h1>

<button onclick="startGame()">게임 시작</button>

<div id="game">
    <div class="turret"></div>
</div>

<script>
let game = document.getElementById("game");

let enemies = [];
let bullets = [];
let money = 0;

function startGame(){
    setInterval(spawnEnemy, 2000);
    setInterval(gameLoop, 50);
}

function spawnEnemy(){
    let enemy = document.createElement("div");
    enemy.className = "enemy";
    enemy.style.left = Math.random()*760 + "px";
    game.appendChild(enemy);
    enemies.push(enemy);
}

function gameLoop(){
    enemies.forEach((e, i)=>{
        let top = parseInt(e.style.top || 0);
        top += 2;
        e.style.top = top + "px";

        if(top > 500){
            e.remove();
            enemies.splice(i,1);
        }
    });

    bullets.forEach((b,i)=>{
        let top = parseInt(b.style.top);
        b.style.top = (top - 5) + "px";

        if(top < 0){
            b.remove();
            bullets.splice(i,1);
        }
    });

    shoot();
    checkHit();
}

function shoot(){
    if(Math.random() < 0.1){
        let bullet = document.createElement("div");
        bullet.className = "bullet";
        bullet.style.left = "390px";
        bullet.style.top = "440px";
        game.appendChild(bullet);
        bullets.push(bullet);
    }
}

function checkHit(){
    bullets.forEach((b, bi)=>{
        enemies.forEach((e, ei)=>{
            let bx = b.offsetLeft;
            let by = b.offsetTop;
            let ex = e.offsetLeft;
            let ey = e.offsetTop;

            if(Math.abs(bx-ex)<20 && Math.abs(by-ey)<20){
                b.remove();
                e.remove();
                bullets.splice(bi,1);
                enemies.splice(ei,1);
                money += 10;
            }
        });
    });
}
</script>

</body>
</html>
