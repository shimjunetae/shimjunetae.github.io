<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kingdom Defense</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#10131a;
    color:white;
    text-align:center;
}

/* 상단 */
header{
    padding:40px;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
}

/* 게임 화면 */
#game{
    width:800px;
    height:500px;
    margin:20px auto;
    background:#222;
    position:relative;
    overflow:hidden;
    border:2px solid #4db8ff;
}

/* 터렛 */
.turret{
    width:70px;
    height:70px;
    position:absolute;
    bottom:20px;
    left:365px;
    background:url('./images/turret.jpg') center/cover no-repeat;
}

/* 적 */
.enemy{
    width:40px;
    height:40px;
    position:absolute;
    top:0;
    background:red;
    border-radius:50%;
}

/* 총알 */
.bullet{
    width:8px;
    height:8px;
    background:yellow;
    position:absolute;
    border-radius:50%;
}

/* 버튼 */
button{
    padding:10px 20px;
    margin:10px;
    background:#4db8ff;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:8px;
}
</style>
</head>

<body>

<header>
    <h1>🏰 Kingdom Defense</h1>
    <p>터렛으로 적을 막아라!</p>
</header>

<button onclick="startGame()">게임 시작</button>

<div id="game">
    <div class="turret"></div>
</div>

<script>
let game = document.getElementById("game");

let enemies = [];
let bullets = [];

function startGame(){
    setInterval(spawnEnemy, 1500);
    setInterval(updateGame, 30);
}

/* 적 생성 */
function spawnEnemy(){
    let enemy = document.createElement("div");
    enemy.className = "enemy";
    enemy.style.left = Math.random()*760 + "px";
    enemy.style.top = "0px";
    game.appendChild(enemy);
    enemies.push(enemy);
}

/* 게임 루프 */
function updateGame(){

    // 적 이동
    enemies.forEach((e, i)=>{
        let top = parseInt(e.style.top);
        e.style.top = (top + 2) + "px";

        if(top > 500){
            e.remove();
            enemies.splice(i,1);
        }
    });

    // 총알 이동
    bullets.forEach((b, i)=>{
        let top = parseInt(b.style.top);
        b.style.top = (top - 5) + "px";

        if(top < 0){
            b.remove();
            bullets.splice(i,1);
        }
    });

    shoot();
    checkCollision();
}

/* 자동 공격 */
function shoot(){
    if(Math.random() < 0.1){
        let bullet = document.createElement("div");
        bullet.className = "bullet";
        bullet.style.left = "390px";
        bullet.style.top = "430px";
        game.appendChild(bullet);
        bullets.push(bullet);
    }
}

/* 충돌 체크 */
function checkCollision(){
    bullets.forEach((b, bi)=>{
        enemies.forEach((e, ei)=>{

            let bx = b.offsetLeft;
            let by = b.offsetTop;
            let ex = e.offsetLeft;
            let ey = e.offsetTop;

            if(Math.abs(bx-ex)<20 && Math.abs(by-ey)<20){
                b.remove();
                e.remove();
                bullets.splice(bi,1);
                enemies.splice(ei,1);
            }
        });
    });
}
</script>

</body>
</html>
