<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Tower Defense Game</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    text-align:center;
    font-family:sans-serif;
}

#game{
    width:800px;
    height:500px;
    margin:10px auto;
    background:#1c1f2a;
    position:relative;
    overflow:hidden;
    border:2px solid #4db8ff;
}

/* 길 */
.path{
    position:absolute;
    width:100%;
    height:60px;
    background:#444;
    top:220px;
}

/* 타워 */
.tower{
    width:45px;
    height:45px;
    position:absolute;
    border-radius:8px;
}

/* 적 */
.enemy{
    width:30px;
    height:30px;
    position:absolute;
    background:red;
    border-radius:50%;
}

/* 총알 */
.bullet{
    width:6px;
    height:6px;
    background:yellow;
    position:absolute;
    border-radius:50%;
}

/* UI */
#ui{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:10px;
}

.btn{
    padding:10px;
    background:#4db8ff;
    border:none;
    cursor:pointer;
    border-radius:6px;
    color:white;
}

.selected{
    background:#ffcc00;
    color:black;
}
</style>
</head>

<body>

<h1>🏰 Tower Defense</h1>
<h3>돈: <span id="money">100</span></h3>

<div id="game">
    <div class="path"></div>
</div>

<!-- 타워 선택 UI -->
<div id="ui">
    <button class="btn" onclick="selectTower(1)">궁수 (20)</button>
    <button class="btn" onclick="selectTower(2)">마법사 (40)</button>
    <button class="btn" onclick="selectTower(3)">터렛 (60)</button>
</div>

<script>
let game = document.getElementById("game");

let money = 100;
let selectedTower = 1;

let towers = [];
let enemies = [];
let bullets = [];

document.getElementById("money").innerText = money;

/* 시작 */
setInterval(spawnEnemy, 2000);
setInterval(update, 30);

/* 타워 선택 */
function selectTower(type){
    selectedTower = type;
}

/* 타워 설치 (길 옆만 허용) */
game.addEventListener("click", (e)=>{

    let rect = game.getBoundingClientRect();

    let x = e.clientX - rect.left;
    let y = e.clientY - rect.top;

    // 길 근처 체크
    if(y > 180 && y < 300){

        let cost = selectedTower == 1 ? 20 : selectedTower == 2 ? 40 : 60;

        if(money < cost) return;

        money -= cost;
        updateMoney();

        let tower = document.createElement("div");
        tower.className = "tower";

        let color = selectedTower == 1 ? "green" :
                    selectedTower == 2 ? "purple" : "blue";

        tower.style.background = color;

        tower.style.left = (x-20) + "px";
        tower.style.top = (y-20) + "px";

        game.appendChild(tower);

        towers.push({
            el:tower,
            x:x,
            y:y,
            type:selectedTower
        });
    }
});

/* 적 생성 */
function spawnEnemy(){
    let enemy = document.createElement("div");
    enemy.className = "enemy";

    enemy.style.left = "0px";
    enemy.style.top = "235px";

    game.appendChild(enemy);

    enemies.push({
        el:enemy,
        x:0,
        y:235,
        hp:3
    });
}

/* 게임 루프 */
function update(){

    // 적 이동
    enemies.forEach((e,i)=>{
        e.x += 2;
        e.el.style.left = e.x + "px";

        if(e.x > 800){
            e.el.remove();
            enemies.splice(i,1);
        }
    });

    // 타워 공격
    towers.forEach(t=>{
        enemies.forEach(e=>{
            let dx = e.x - t.x;
            let dy = e.y - t.y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if(dist < 120){
                shoot(t,e);
            }
        });
    });

    // 총알 이동
    bullets.forEach((b,i)=>{
        b.x += b.vx;
        b.y += b.vy;

        b.el.style.left = b.x + "px";
        b.el.style.top = b.y + "px";

        enemies.forEach(e=>{
            if(Math.abs(b.x-e.x)<20 && Math.abs(b.y-e.y)<20){
                e.hp--;

                if(e.hp <= 0){
                    e.el.remove();
                    e.dead = true;
                    money += 5;
                    updateMoney();
                }

                b.el.remove();
                bullets.splice(i,1);
            }
        });
    });

    enemies = enemies.filter(e=>!e.dead);
}

/* 발사 */
function shoot(t,e){
    if(Math.random() < 0.08){
        let bullet = document.createElement("div");
        bullet.className = "bullet";

        bullet.x = t.x;
        bullet.y = t.y;

        let dx = e.x - t.x;
        let dy = e.y - t.y;

        let dist = Math.sqrt(dx*dx + dy*dy);

        bullet.vx = dx/dist * 5;
        bullet.vy = dy/dist * 5;

        bullet.el = bullet;

        game.appendChild(bullet);

        bullets.push(bullet);
    }
}

/* 돈 UI */
function updateMoney(){
    document.getElementById("money").innerText = money;
}
</script>

</body>
</html>
